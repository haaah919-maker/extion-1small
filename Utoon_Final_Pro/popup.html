<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #a855f7;
            --primary-dark: #7c3aed;
            --secondary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .premium-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 20px;
            position: relative;
        }

        .premium-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            background: linear-gradient(to right, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* Status Card */
        .status-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(12px);
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .info-row {
            margin-bottom: 15px;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .value-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Progress Bar */
        .progress-section { margin-top: 15px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .progress-title { font-size: 11px; font-weight: 600; }
        .progress-val { font-size: 11px; color: var(--primary); font-weight: bold; }

        .bar-outer { height: 6px; background: #334155; border-radius: 10px; overflow: hidden; }
        .bar-inner { height: 100%; background: linear-gradient(to right, var(--primary), var(--primary-dark)); width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* VIP Badge */
        .vip-badge {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #000;
            padding: 10px;
            border-radius: 10px;
            display: flex; align-items: center; gap: 8px;
            font-weight: bold; font-size: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        /* Actions */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4); }

        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #plan-badge {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="premium-bg">
        <div id="plan-badge">FREE PLAN</div>

        <div class="header">
            <div class="logo-box">📖</div>
            <h1>Utoon Pro Max</h1>
            <p class="subtitle">Legendary Edition v3.3</p>
        </div>

        <div class="status-card">
            <div class="info-row">
                <span class="label">User Digital Identity</span>
                <div class="value-box">
                    <span id="user-id">Loading...</span>
                    <span style="font-size: 10px; opacity: 0.5;">ID</span>
                </div>
            </div>

            <div id="usage-section" class="progress-section">
                <div class="progress-header">
                    <span class="progress-title">Daily Energy Consumption</span>
                    <span id="daily-text" class="progress-val">0/1</span>
                </div>
                <div class="bar-outer">
                    <div id="usage-progress" class="bar-inner"></div>
                </div>
            </div>

            <div id="vip-section" style="display:none">
                <div class="vip-badge">
                    <span>👑</span>
                    <span id="vip-label">Premium Membership Active</span>
                </div>
                <div style="font-size: 10px; text-align: center; margin-top: 8px; color: #fbbf24;" id="vip-date"></div>
            </div>
        </div>

        <div class="actions">
            <button id="refresh-btn" class="btn btn-primary">
                <span>🔄</span> Sync Status
            </button>
            <button id="copy-id" class="btn btn-secondary">
                <span>📋</span> Copy ID
            </button>
        </div>

        <div class="footer">
            Designed for Excellence • Powered by Supabase Cloud
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
