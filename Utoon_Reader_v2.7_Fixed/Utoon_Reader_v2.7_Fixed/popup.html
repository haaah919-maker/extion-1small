<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utoon Reader Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 400px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0c1b;
            color: #e2d9f3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #4c1d95;
        }
        .header {
            background: linear-gradient(135deg, #2e1065, #4c1d95);
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid #7c3aed;
        }
        .header h1 {
            font-size: 18px;
            color: #c4b5fd;
            margin-bottom: 10px;
        }
        .stats-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: rgba(124, 58, 237, 0.3);
            border: 1px solid #7c3aed;
            border-radius: 16px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
        }
        .stat-badge.free { background: rgba(34, 197, 94, 0.3); border-color: #22c55e; }
        .stat-badge.premium { background: rgba(251, 146, 60, 0.3); border-color: #fb923c; }
        .stat-badge.locked { background: rgba(217, 48, 37, 0.3); border-color: #d93025; color: #fca5a5; }
        .stat-badge .count { color: #a78bfa; font-size: 13px; }
        .stat-badge.free .count { color: #4ade80; }
        .stat-badge.premium .count { color: #fdba74; }
        .stat-badge.locked .count { color: #fca5a5; }
        .status {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 8px;
            font-weight: 600;
        }
        .content {
            padding: 12px;
            max-height: 480px;
            overflow-y: auto;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: #1e1b4b; }
        .content::-webkit-scrollbar-thumb { background: #6d28d9; border-radius: 3px; }
        .chapter-item {
            background: rgba(46, 16, 101, 0.5);
            border: 1px solid #5b21b6;
            padding: 9px 11px;
            border-radius: 8px;
            margin-bottom: 7px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .chapter-item.free {
            background: rgba(22, 101, 52, 0.3);
            border-color: #16a34a;
        }
        .chapter-item.unlocked {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        .chapter-item.premium-locked {
            opacity: 0.7;
            background: rgba(30, 30, 30, 0.5);
            border-color: #6b7280;
        }
        .chapter-info {
            flex: 1;
            min-width: 0;
        }
        .chapter-title {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .chapter-meta {
            font-size: 10px;
            color: #9ca3af;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .coin-tag, .free-tag, .lock-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }
        .coin-tag { background: #f39c12; }
        .free-tag { background: #22c55e; }
        .lock-tag { background: #ef4444; }
        .unlock-btn, .open-btn {
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            color: white;
        }
        .unlock-btn {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }
        .unlock-btn:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        .unlock-btn:disabled {
            background: #374151;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .open-btn {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }
        .unlocked-tag {
            color: #4ade80;
            font-size: 10px;
            font-weight: bold;
        }
        .reset-timer {
            text-align: center;
            font-size: 10px;
            color: #6b7280;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #374151;
        }
        .legend {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 8px;
            font-size: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .legend-dot.free { background: #22c55e; }
        .legend-dot.unlocked { background: #4ade80; }
        .legend-dot.premium { background: #f39c12; }
        .debug-info {
            background: rgba(255,255,0,0.1);
            border: 1px solid #fbbf24;
            padding: 8px;
            border-radius: 6px;
            font-size: 10px;
            margin-bottom: 8px;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Utoon Reader Pro v2.7</h1>
        <div class="stats-row">
            <div class="stat-badge free">
                <span class="count" id="free-count">0</span> Free
            </div>
            <div class="stat-badge premium">
                <span class="count" id="premium-count">0</span> Premium
            </div>
            <div class="stat-badge">
                <span class="count" id="unlocked-count">0</span> Unlocked
            </div>
            <div class="stat-badge" id="limit-badge">
                <span class="count" id="remaining-count">5</span>/5 Today
            </div>
        </div>
        <div class="status" id="status">Loading...</div>
    </div>
    <div class="content">
        <div class="debug-info" id="debug-info" style="display:none;"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot free"></div>Free</div>
            <div class="legend-item"><div class="legend-dot unlocked"></div>Unlocked</div>
            <div class="legend-item"><div class="legend-dot premium"></div>Premium</div>
        </div>
        <div id="chapter-list"></div>
        <div class="reset-timer" id="reset-timer"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
