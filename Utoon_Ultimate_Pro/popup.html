<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1014;
            color: #e2d9f3;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h2 {
            color: #7c3aed;
            margin-top: 0;
        }
        .btn {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .footer {
            font-size: 11px;
            color: #64748b;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h2>Utoon Ultimate Pro</h2>
    <p>Enhanced Manga Reading</p>
    <button id="inject-btn" class="btn">Open Reader</button>
    <button id="discord-btn" class="btn" style="background: #5865F2;">Join Discord</button>
    <div class="footer">Version 1.0 | discord: @threads</div>
    <script src="popup.js"></script>
</body>
</html>
