<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            background: #0a0514;
            color: #e2d9f3;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #5b21b6;
            padding-bottom: 10px;
        }
        .logo { width: 32px; height: 32px; }
        .title { font-weight: bold; font-size: 16px; color: #7c3aed; }
        .btn {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn:hover { background: #6d28d9; }
        .footer {
            margin-top: 15px;
            font-size: 11px;
            text-align: center;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon.png" class="logo">
        <span class="title">Utoon Ultimate Pro</span>
    </div>

    <button id="inject-btn" class="btn">OPEN READER</button>

    <div class="footer">
        Version 2.0 | Discord: @threads
    </div>

    <script src="popup.js"></script>
</body>
</html>
