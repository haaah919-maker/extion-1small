<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utoon Ultimate Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0514 0%, #1a0d2e 100%);
            color: #e2d9f3;
            padding: 24px;
            min-height: 520px;
            overflow-y: auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            box-shadow: 0 12px 24px rgba(168, 85, 247, 0.25);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #a0aec0;
            font-weight: 400;
        }

        .version-badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            color: #d8b4fe;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 10px;
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Button Group */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
            z-index: 0;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn > * {
            position: relative;
            z-index: 1;
        }

        /* Primary Button */
        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(168, 85, 247, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Secondary Button */
        .btn-secondary {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.25);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.35);
        }

        /* Features Section */
        .features {
            background: rgba(30, 27, 50, 0.5);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .features-title {
            font-size: 12px;
            font-weight: 600;
            color: #d8b4fe;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #cbd5e1;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-check {
            flex-shrink: 0;
            color: #a855f7;
            font-weight: bold;
            font-size: 14px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid rgba(168, 85, 247, 0.15);
        }

        .version-text {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .social-link:hover {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.25);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.5);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            animation: slideIn 0.3s ease-out;
        }

        /* Icon styling */
        .icon {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">📖</div>
        <h1>Utoon Ultimate Pro</h1>
        <p class="subtitle">Advanced Manga Reader</p>
        <div class="version-badge">v1.4 - Purple Edition</div>
    </div>

    <!-- Main Buttons -->
    <div class="button-group">
        <button id="inject-btn" class="btn btn-primary">
            <span class="icon">▶️</span>
            <span>Open Reader</span>
        </button>
        <button id="discord-btn" class="btn btn-secondary">
            <span class="icon">💬</span>
            <span>Join Discord @threads</span>
        </button>
    </div>

    <!-- Features -->
    <div class="features">
        <div class="features-title">✨ Features</div>
        <div class="feature-item">
            <span class="feature-check">✓</span>
            <span>Auto-scroll to first image</span>
        </div>
        <div class="feature-item">
            <span class="feature-check">✓</span>
            <span>Multiple theme options</span>
        </div>
        <div class="feature-item">
            <span class="feature-check">✓</span>
            <span>Download ZIP & PDF</span>
        </div>
        <div class="feature-item">
            <span class="feature-check">✓</span>
            <span>Visual effects support</span>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="version-text">Utoon Ultimate Pro © 2026</div>
        <div class="social-links">
            <a href="#" class="social-link" title="Discord">💬</a>
            <a href="#" class="social-link" title="Website">🌐</a>
            <a href="#" class="social-link" title="Settings">⚙️</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
