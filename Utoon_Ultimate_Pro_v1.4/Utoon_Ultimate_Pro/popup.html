<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utoon Ultimate Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            padding: 24px;
            min-height: 500px;
            direction: rtl;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(6, 182, 212, 0.2);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Stats Section */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(30, 41, 59, 1);
            border-color: rgba(6, 182, 212, 0.3);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #06b6d4;
        }

        /* Main Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Primary Button */
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(6, 182, 212, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(6, 182, 212, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Secondary Button */
        .btn-secondary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.25);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.35);
        }

        /* Tertiary Button */
        .btn-tertiary {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .btn-tertiary:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(148, 163, 184, 0.4);
            transform: translateY(-2px);
        }

        /* Icon */
        .icon {
            font-size: 16px;
        }

        /* Features Section */
        .features {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .features-title {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #cbd5e1;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            flex-shrink: 0;
            color: #06b6d4;
            font-weight: bold;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .version {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .social-link:hover {
            background: #06b6d4;
            color: white;
            transform: translateY(-2px);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.4);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">📖</div>
        <h1>Utoon Ultimate Pro</h1>
        <p>قارئ المانهوا المتقدم</p>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">النسخة</div>
            <div class="stat-value">1.4</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">الحالة</div>
            <div class="stat-value">نشط ✓</div>
        </div>
    </div>

    <!-- Main Buttons -->
    <div class="button-group">
        <button id="inject-btn" class="btn btn-primary">
            <span class="icon">▶</span>
            <span>فتح القارئ</span>
        </button>
        <button id="discord-btn" class="btn btn-secondary">
            <span class="icon">💬</span>
            <span>انضم للديسكورد</span>
        </button>
    </div>

    <!-- Features -->
    <div class="features">
        <div class="features-title">✨ المميزات</div>
        <div class="feature-item">
            <span class="feature-icon">✓</span>
            <span>قراءة سلسة وسريعة</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">✓</span>
            <span>تحميل الفصول بسهولة</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">✓</span>
            <span>واجهة حديثة وعصرية</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">✓</span>
            <span>دعم العديد من المواقع</span>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="version">الإصدار 1.4 | 2026</div>
        <div class="social-links">
            <a href="#" class="social-link" title="Discord">D</a>
            <a href="#" class="social-link" title="Twitter">𝕏</a>
            <a href="#" class="social-link" title="GitHub">⚙</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
