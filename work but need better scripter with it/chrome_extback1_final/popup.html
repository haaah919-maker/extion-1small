<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utoon Reader Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 320px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #1a0b2e);
            color: #e2d9f3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #4c1d95;
        }

        .header {
            background: #2e1065;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #7c3aed;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-size: 18px;
            color: #c4b5fd;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(196, 181, 253, 0.5);
        }

        .status {
            font-size: 12px;
            color: #a78bfa;
            font-weight: bold;
        }

        .content {
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            position: relative;
        }

        /* Scrollbar */
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: #1e1b4b; }
        .content::-webkit-scrollbar-thumb { background: #6d28d9; border-radius: 3px; }
        .content::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chapter-item {
            background: rgba(46, 16, 101, 0.4);
            border: 1px solid #5b21b6;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chapter-item:hover {
            background: rgba(109, 40, 217, 0.6);
            border-color: #8b5cf6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.4);
            color: #fff;
        }

        .chapter-item::after {
            content: '►';
            font-size: 10px;
            color: #a78bfa;
        }

        .btn-large {
            display: none;
            width: 100%;
            background: linear-gradient(to right, #6d28d9, #4c1d95);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
            margin-bottom: 10px;
        }

        .btn-large:hover {
            background: linear-gradient(to right, #7c3aed, #5b21b6);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            padding: 10px;
            font-size: 10px;
            color: #6b7280;
            background: #0a0a0a;
            border-top: 1px solid #2e1065;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Utoon Reader</h1>
        <div class="status" id="status">Initializing...</div>
    </div>

    <div class="content">
        <button id="inject-btn" class="btn-large">Open Reader Mode</button>
        <div id="chapter-list" class="chapter-list"></div>
    </div>

    <div class="footer">
        Powered by AI Bypass Technology
    </div>

    <script src="popup.js"></script>
</body>
</html>
